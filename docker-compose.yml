services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: tinypm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: tinypm
    ports:
      - "6105:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinypm -d tinypm"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "6100:6000"
    environment:
      DATABASE_URL: postgresql://tinypm:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/tinypm
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: '["http://localhost:6101"]'
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin}
      INITIAL_ADMIN_DISPLAY_NAME: ${INITIAL_ADMIN_DISPLAY_NAME:-平台管理员}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploadsdata:/app/uploads
      - docsdata:/app/documents

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "6101:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploadsdata:
  docsdata:
